<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB:LB パズル攻略ツール</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #222230;
    --border: #2e2e40;
    --border2: #3a3a52;
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #555570;
    --cell: 48px;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: .04em; }
  .logo span { color: #a78bfa; }
  .subtitle { font-size: 12px; color: var(--text2); }

  .main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 57px); }

  .sidebar { border-right: 1px solid var(--border); padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: calc(100vh - 57px); }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .panel-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); margin-bottom: .75rem; }

  .rank-filters { display: flex; flex-direction: column; gap: 4px; }
  .rank-filter-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 8px; border-radius: var(--radius); transition: background .15s; user-select: none; }
  .rank-filter-row:hover { background: var(--surface2); }
  .rank-cb { appearance: none; width: 16px; height: 16px; border-radius: 4px; cursor: pointer; flex-shrink: 0; position: relative; transition: all .15s; }
  .rank-cb:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }
  .rank-badge { font-size: 13px; font-weight: 700; padding: 2px 10px; border-radius: 20px; min-width: 44px; text-align: center; }
  .rank-info { font-size: 12px; color: var(--text2); flex: 1; }
  .rank-sel-cnt { font-size: 11px; color: var(--text3); }

  .piece-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 360px; overflow-y: auto; }
  .piece-list::-webkit-scrollbar { width: 4px; }
  .piece-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .pcard { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: border-color .15s; }
  .pcard:hover { border-color: var(--border2); }
  .pcard.active { border-color: currentColor; background: #1e1e2e; }
  .pcard-id { font-size: 10px; color: var(--text2); }
  .qty-row { display: flex; align-items: center; gap: 3px; }
  .qty-btn { width: 20px; height: 20px; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .1s; line-height: 1; }
  .qty-btn:hover { background: var(--border); }
  .qty-val { font-size: 13px; font-weight: 700; min-width: 18px; text-align: center; color: var(--text); }

  .solve-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #7c3aed, #06b6d4); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; letter-spacing: .05em; }
  .solve-btn:hover { opacity: .85; }
  .solve-btn:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; opacity: 1; }
  .clear-btn { width: 100%; padding: 8px; background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: all .15s; }
  .clear-btn:hover { border-color: var(--border2); color: var(--text); }

  .summary-bar { font-size: 12px; color: var(--text2); text-align: center; }
  .summary-bar strong { color: var(--text); }

  .result-area { padding: 1.5rem; overflow-y: auto; max-height: calc(100vh - 57px); }
  .result-area::-webkit-scrollbar { width: 4px; }
  .result-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; color: var(--text3); font-size: 14px; padding: 4rem; text-align: center; min-height: 300px; }

  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-val.perfect { background: linear-gradient(90deg,#7c3aed,#06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .sol-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .nav-btn { padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; }
  .nav-btn:hover:not(:disabled) { border-color: #7c3aed; color: #a78bfa; }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .sol-label { font-size: 13px; color: var(--text2); }

  .board-wrap { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .board { display: grid; grid-template-columns: repeat(5, var(--cell)); gap: 3px; }
  .board-cell { width: var(--cell); height: var(--cell); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 1px solid transparent; }
  .board-cell.empty { background: var(--surface2); border-color: var(--border); color: var(--text3); }

  .legend-wrap { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .legend-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: 2px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: var(--radius); }
  .legend-id { font-size: 11px; font-weight: 700; min-width: 32px; }
  .legend-name { font-size: 11px; color: var(--text2); }

  .no-result { color: var(--text2); font-size: 14px; padding: 2rem; text-align: center; }

  /* SSランク マーブルアニメ */
  @keyframes marble { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .ss-marble { background: linear-gradient(270deg,#7c3aed,#06b6d4,#a78bfa,#22d3ee); background-size: 400% 400%; animation: marble 4s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    .result-area { max-height: none; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">QB<span>:LB</span> パズル攻略ツール</div>
    <div class="subtitle">Queen's Blade Limit Break — サードパーティツール / SS:107種類対応</div>
  </div>
</header>

    <div class="empty-state">

    cb.onchange = () => {
      cb.style.background = cb.checked ? m.border : 'transparent';
      if (cb.checked) visibleRanks.add(r); else visibleRanks.delete(r);
      renderPieceList();
    };

    const badge = document.createElement('span');
    badge.className = 'rank-badge';
    if (m.marble) {
      badge.innerHTML = `<span class="ss-marble">SS</span>`;
      badge.style.cssText = `background:${m.bg};border:1px solid ${m.border};`;
    } else {
      badge.textContent = r;
      badge.style.cssText = `background:${m.bg};color:${m.color};border:1px solid ${m.border};`;
    }

    const info = document.createElement('span');
    info.className = 'rank-info';
    const total = ALL_PIECES.filter(p => p.rank === r).length;
    const sel = ALL_PIECES.filter(p => p.rank === r && quantities[p.id] > 0).length;
    info.textContent = `${m.size}マス / ${total}種`;

    const cnt = document.createElement('span');
    cnt.className = 'rank-sel-cnt';
    cnt.id = 'rcnt-' + r;
    cnt.textContent = sel > 0 ? `選${sel}` : '';

    row.appendChild(cb); row.appendChild(badge); row.appendChild(info); row.appendChild(cnt);
    cont.appendChild(row);
  });
}

function drawMiniPiece(cells, color, sz) {
  const maxR = Math.max(...cells.map(c => c[0]));
  const maxC = Math.max(...cells.map(c => c[1]));
  const wrap = document.createElement('div');
  wrap.style.cssText = `display:inline-grid;grid-template-columns:repeat(${maxC+1},${sz}px);gap:1px;`;
  for (let r = 0; r <= maxR; r++) for (let c = 0; c <= maxC; c++) {
    const cell = document.createElement('div');
    const filled = cells.some(([pr, pc]) => pr === r && pc === c);
    cell.style.cssText = `width:${sz}px;height:${sz}px;border-radius:2px;background:${filled ? color + '55' : 'transparent'};border:1px solid ${filled ? color + '99' : 'transparent'};`;
    wrap.appendChild(cell);
  }
  return wrap;
}

function renderPieceList() {
  const cont = document.getElementById('piece-list');
  cont.innerHTML = '';
  const visible = ALL_PIECES.filter(p => visibleRanks.has(p.rank));
  visible.forEach(p => {
    const m = RANK_META[p.rank];
    const card = document.createElement('div');
    card.className = 'pcard' + (quantities[p.id] > 0 ? ' active' : '');
    card.id = 'pc-' + p.id;
    card.style.color = m.color;
    if (quantities[p.id] > 0) card.style.borderColor = m.border;

    card.appendChild(drawMiniPiece(p.cells, m.color, 14));

    const idEl = document.createElement('div');
    idEl.className = 'pcard-id';
    idEl.style.color = quantities[p.id] > 0 ? m.color : '';
    idEl.textContent = p.id;
    card.appendChild(idEl);

    const qRow = document.createElement('div');
    qRow.className = 'qty-row';
    const minus = document.createElement('button');
    minus.className = 'qty-btn';
    minus.textContent = '−';
    minus.onclick = e => { e.stopPropagation(); if (quantities[p.id] > 0) { quantities[p.id]--; refreshCard(p); } };
    const valEl = document.createElement('span');
    valEl.className = 'qty-val';
    valEl.id = 'qv-' + p.id;
    valEl.textContent = quantities[p.id];
    const plus = document.createElement('button');
    plus.className = 'qty-btn';
    plus.textContent = '+';
    plus.onclick = e => { e.stopPropagation(); if (quantities[p.id] < 9) { quantities[p.id]++; refreshCard(p); } };
    qRow.appendChild(minus); qRow.appendChild(valEl); qRow.appendChild(plus);
    card.appendChild(qRow);

    card.onclick = () => {
      quantities[p.id] = quantities[p.id] > 0 ? 0 : 1;
      refreshCard(p);
    };
    cont.appendChild(card);
  });
  updateSummary();
  // ランクフィルタの選択数更新
  RANKS.forEach(r => {
    const el = document.getElementById('rcnt-' + r);
    if (el) {
      const sel = ALL_PIECES.filter(p => p.rank === r && quantities[p.id] > 0).length;
      el.textContent = sel > 0 ? `選${sel}` : '';
    }
  });
}

function refreshCard(p) {
  const m = RANK_META[p.rank];
  const card = document.getElementById('pc-' + p.id);
  if (!card) return;
  const valEl = document.getElementById('qv-' + p.id);
  if (valEl) valEl.textContent = quantities[p.id];
  const active = quantities[p.id] > 0;
  card.classList.toggle('active', active);
  card.style.borderColor = active ? m.border : '';
  const idEl = card.querySelector('.pcard-id');
  if (idEl) idEl.style.color = active ? m.color : '';
  const el = document.getElementById('rcnt-' + p.rank);
  if (el) {
    const sel = ALL_PIECES.filter(q => q.rank === p.rank && quantities[q.id] > 0).length;
    el.textContent = sel > 0 ? `選${sel}` : '';
  }
  updateSummary();
}

function updateSummary() {
  const sel = ALL_PIECES.filter(p => quantities[p.id] > 0);
  const totalMasu = sel.reduce((s, p) => s + p.cells.length * quantities[p.id], 0);
  const bar = document.getElementById('summary-bar');
  const btn = document.getElementById('solve-btn');
  if (sel.length) {
    bar.innerHTML = `<strong>${sel.length}</strong>種類 / 計<strong>${totalMasu}</strong>マス分を選択中`;
    btn.disabled = false;
  } else {
    bar.textContent = 'ピースを選択してください';
    btn.disabled = true;
  }
}

function clearAll() {
  ALL_PIECES.forEach(p => quantities[p.id] = 0);
  renderPieceList();
  buildRankFilters();
}

function doSolve() {
  const btn = document.getElementById('solve-btn');
  btn.disabled = true;
  btn.textContent = '計算中...';
  setTimeout(() => {
    const inventory = [];
    ALL_PIECES.forEach(p => { for (let i = 0; i < quantities[p.id]; i++) inventory.push(p); });

    const board = Array(5).fill(null).map(() => Array(5).fill(-1));
    let bestFilled = 0;
    let bestSols = [];
    const used = Array(inventory.length).fill(false);
    let calls = 0;
    const MAX = 300000;

    function canPlace(r, c, cells) {
      for (const [dr, dc] of cells) {
        const nr = r+dr, nc = c+dc;
        if (nr < 0 || nr >= 5 || nc < 0 || nc >= 5 || board[nr][nc] !== -1) return false;
      }
      return true;
    }
    function place(r, c, cells, idx) { for (const [dr, dc] of cells) board[r+dr][c+dc] = idx; }
    function unplace(cells, r, c) { for (const [dr, dc] of cells) board[r+dr][c+dc] = -1; }
    function countFilled() {
      let n = 0;
      for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) if (board[r][c] !== -1) n++;
      return n;
    }
    function saveSol(filled) {
      bestSols.push({ board: board.map(r => [...r]), filled, usedIdx: used.map((v,i) => v ? i : -1).filter(i => i >= 0) });
    }

    function search() {
      if (calls++ > MAX) return;
      const cur = countFilled();
      if (cur > bestFilled) { bestFilled = cur; bestSols = []; }
      if (cur === bestFilled && bestSols.length < 30) saveSol(cur);
      if (cur === 25) return;
      const seenId = new Set();
      for (let pi = 0; pi < inventory.length; pi++) {
        if (used[pi]) continue;
        if (seenId.has(inventory[pi].id)) continue;
        seenId.add(inventory[pi].id);
        used[pi] = true;
        for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) {
          if (canPlace(r, c, inventory[pi].cells)) {
            place(r, c, inventory[pi].cells, pi);
            search();
            unplace(inventory[pi].cells, r, c);
            if (calls > MAX) { used[pi] = false; return; }
          }
        }
        used[pi] = false;
      }
    }
    search();

    const seenBoards = new Set();
    const unique = [];
    for (const s of bestSols) {
      const key = s.board.flat().map(i => i >= 0 ? inventory[i].id : '_').join(',');
      if (!seenBoards.has(key)) { seenBoards.add(key); unique.push(s); }
    }
    solutions = unique;
    renderResults(inventory);
    btn.disabled = false;
    btn.textContent = '攻略を計算する';
  }, 20);
}

function renderResults(inventory) {
  const cont = document.getElementById('result-area');
  cont.innerHTML = '';
  if (!solutions.length) {
    cont.innerHTML = '<div class="no-result">解が見つかりませんでした。別のピースを試してください。</div>';
    return;
  }
  const best = solutions[0];

  const stats = document.createElement('div');
  stats.className = 'result-stats';
  [
    { label: '最大充填マス', val: best.filled + ' / 25', perfect: best.filled === 25 },
    { label: '充填率', val: Math.round(best.filled / 25 * 100) + '%', perfect: best.filled === 25 },
    { label: 'パターン数', val: solutions.length + '件', perfect: false },
  ].forEach(({ label, val, perfect }) => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-label">${label}</div><div class="stat-val${perfect?' perfect':''}">${val}</div>`;
    stats.appendChild(card);
  });
  cont.appendChild(stats);

  let idx = 0;
  const navRow = document.createElement('div');
  navRow.className = 'sol-nav';
  const prevBtn = document.createElement('button'); prevBtn.className = 'nav-btn'; prevBtn.textContent = '← 前';
  const nextBtn = document.createElement('button'); nextBtn.className = 'nav-btn'; nextBtn.textContent = '次 →';
  const label = document.createElement('span'); label.className = 'sol-label';
  navRow.appendChild(prevBtn); navRow.appendChild(label); navRow.appendChild(nextBtn);
  cont.appendChild(navRow);

  const boardWrap = document.createElement('div');
  boardWrap.className = 'board-wrap';
  const boardEl = document.createElement('div'); boardEl.className = 'board';
  const legendWrap = document.createElement('div'); legendWrap.className = 'legend-wrap';
  boardWrap.appendChild(boardEl); boardWrap.appendChild(legendWrap);
  cont.appendChild(boardWrap);

  function renderSol() {
    boardEl.innerHTML = ''; legendWrap.innerHTML = '';
    const sol = solutions[idx];
    label.textContent = `パターン ${idx+1} / ${solutions.length}　(${sol.filled}/25マス)`;
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === solutions.length - 1;

    const colorMap = {};
    [...new Set(sol.usedIdx)].forEach((pi, i) => { colorMap[pi] = PIECE_COLORS[i % PIECE_COLORS.length]; });

    for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) {
      const cell = document.createElement('div');
      cell.className = 'board-cell';
      const pi = sol.board[r][c];
      if (pi === -1) {
        cell.classList.add('empty');
      } else {
        const col = colorMap[pi];
        cell.style.cssText = `background:${col}33;color:${col};border-color:${col}66;`;
        cell.textContent = inventory[pi].id;
      }
      boardEl.appendChild(cell);
    }

    legendWrap.innerHTML = '<div class="legend-title">使用ピース</div>';
    [...new Set(sol.usedIdx)].forEach(pi => {
      const col = colorMap[pi];
      const p = inventory[pi];
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.style.background = col + '18';
      const mini = drawMiniPiece(p.cells, col, 10);
      const idEl = document.createElement('span');
      idEl.className = 'legend-id'; idEl.style.color = col;
      idEl.textContent = p.id;
      const nmEl = document.createElement('span');
      nmEl.className = 'legend-name';
      nmEl.textContent = `${p.rank}ランク / ${p.cells.length}マス`;
      item.appendChild(mini); item.appendChild(idEl); item.appendChild(nmEl);
      legendWrap.appendChild(item);
    });
  }

  prevBtn.onclick = () => { if (idx > 0) { idx--; renderSol(); } };
  nextBtn.onclick = () => { if (idx < solutions.length - 1) { idx++; renderSol(); } };
  renderSol();
}

buildRankFilters();
renderPieceList();
</script>
